host: localhost:8080
info:
  contact: {}
  description: |-
    Internal RESTful API serving Al-Quran data (Arabic text, Indonesian & English translations) for the Ilmunara super app.

    ---

    ## MCP Server

    API ini dilengkapi dengan **MCP (Model Context Protocol) server** sehingga bisa digunakan langsung dari AI assistant seperti Claude, Cursor, dan tools lainnya.

    ### Koneksi

    | | |
    |---|---|
    | **URL** | `https://quran.api.digitalislami.id/mcp` |
    | **Transport** | Streamable HTTP |
    | **Mode** | Stateless (tidak perlu session) |

    ### Setup Claude Desktop

    Tambahkan ke file `claude_desktop_config.json`:

    ```json
    {
    "mcpServers": {
        "quran": {
          "type": "http",
          "url": "https://quran.api.digitalislami.id/mcp"
        }
      }
    }
    ```

    ### Tools yang Tersedia

    | Tool | Deskripsi |
    |---|---|
    | `list_surahs` | Daftar semua 114 surah |
    | `get_surah` | Detail surah berdasarkan ID |
    | `get_ayahs_by_surah` | Ayat-ayat dalam surah tertentu |
    | `get_ayah` | Ayat berdasarkan ID global |
    | `get_ayah_by_ref` | Ayat berdasarkan nomor surah dan ayat |
    | `random_ayah` | Ayat acak |
    | `list_juz` | Daftar semua 30 juz |
    | `get_juz` | Detail juz tertentu |
    | `get_ayahs_by_juz` | Ayat-ayat dalam juz tertentu |
    | `search_quran` | Pencarian full-text (Arab, Indonesia, Inggris) |

    ### Contoh Penggunaan

    Setelah terhubung, kamu bisa langsung tanya ke AI:

    > *"Tampilkan ayat pertama surah Al-Baqarah beserta terjemahannya"*

    > *"Cari ayat yang mengandung kata 'sabar' dalam terjemahan Indonesia"*

    > *"Surah apa saja yang ada di Juz 30?"*
  title: Quran API Go
  version: 1.0.0
paths:
  /ayah/{id}:
    get:
      description: Get a specific ayah by its global ID (1-6236)
      parameters:
        - description: Global ayah ID (1-6236)
          in: path
          maximum: 6236
          minimum: 1
          name: id
          required: true
          type: integer
        - default: id
          description: Translation language
          enum:
            - id
            - en
          in: query
          name: lang
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
              - $ref: "#/definitions/response.SuccessResponse"
              - properties:
                  data:
                    $ref: "#/definitions/handler.AyahDetailResponse"
                type: object
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/response.ErrorResponse"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/response.ErrorResponse"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/response.ErrorResponse"
      summary: Get ayah by global ID
      tags:
        - Ayah
  /health:
    get:
      description: Check if the API is running
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
              - $ref: "#/definitions/response.SuccessResponse"
              - properties:
                  data:
                    $ref: "#/definitions/healthcheck.HealthCheck"
                type: object
        "503":
          description: Service Unavailable
          schema:
            $ref: "#/definitions/response.ErrorResponse"
      summary: Health check
      tags:
        - Health
  /health/ready:
    get:
      description: Check if the API is ready to serve requests (database connectivity)
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
              - $ref: "#/definitions/response.SuccessResponse"
              - properties:
                  data:
                    $ref: "#/definitions/healthcheck.HealthCheck"
                type: object
        "503":
          description: Service Unavailable
          schema:
            $ref: "#/definitions/response.ErrorResponse"
      summary: Readiness check
      tags:
        - Health
  /juz:
    get:
      description: Get a list of all 30 juz (parts) of the Quran
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
              - $ref: "#/definitions/response.SuccessResponse"
              - properties:
                  data:
                    items:
                      $ref: "#/definitions/juz.Juz"
                    type: array
                type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/response.ErrorResponse"
      summary: List all juz
      tags:
        - Juz
  /juz/{number}:
    get:
      description: Get detailed information about a specific juz
      parameters:
        - description: Juz number (1-30)
          in: path
          maximum: 30
          minimum: 1
          name: number
          required: true
          type: integer
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
              - $ref: "#/definitions/response.SuccessResponse"
              - properties:
                  data:
                    $ref: "#/definitions/juz.Juz"
                type: object
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/response.ErrorResponse"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/response.ErrorResponse"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/response.ErrorResponse"
      summary: Get juz by number
      tags:
        - Juz
  /juz/{number}/ayah:
    get:
      description: Get all ayahs from a specific juz with pagination
      parameters:
        - description: Juz number (1-30)
          in: path
          maximum: 30
          minimum: 1
          name: number
          required: true
          type: integer
        - default: 1
          description: Page number
          in: query
          minimum: 1
          name: page
          type: integer
        - default: 50
          description: Items per page
          in: query
          maximum: 100
          minimum: 1
          name: limit
          type: integer
        - default: id
          description: Translation language
          enum:
            - id
            - en
          in: query
          name: lang
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
              - $ref: "#/definitions/response.SuccessResponse"
              - properties:
                  data:
                    $ref: "#/definitions/handler.JuzAyahsResponse"
                type: object
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/response.ErrorResponse"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/response.ErrorResponse"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/response.ErrorResponse"
      summary: Get ayahs by juz
      tags:
        - Juz
  /juz/{number}/surah:
    get:
      description: Get all surahs that appear in a specific juz
      parameters:
        - description: Juz number (1-30)
          in: path
          maximum: 30
          minimum: 1
          name: number
          required: true
          type: integer
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
              - $ref: "#/definitions/response.SuccessResponse"
              - properties:
                  data:
                    items:
                      $ref: "#/definitions/juz.JuzSurah"
                    type: array
                type: object
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/response.ErrorResponse"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/response.ErrorResponse"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/response.ErrorResponse"
      summary: Get surahs by juz
      tags:
        - Juz
  /random:
    get:
      description: Get a random ayah, optionally filtered by surah
      parameters:
        - default: 0
          description: Filter by surah ID (0 = any)
          in: query
          minimum: 0
          name: surah_id
          type: integer
        - default: id
          description: Translation language
          enum:
            - id
            - en
          in: query
          name: lang
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
              - $ref: "#/definitions/response.SuccessResponse"
              - properties:
                  data:
                    $ref: "#/definitions/handler.AyahDetailResponse"
                type: object
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/response.ErrorResponse"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/response.ErrorResponse"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/response.ErrorResponse"
      summary: Get random ayah
      tags:
        - Ayah
  /sajda:
    get:
      description: Get all 15 sajda tilawah ayahs in the Quran
      parameters:
        - default: id
          description: Translation language
          enum:
            - id
            - en
          in: query
          name: lang
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
              - $ref: "#/definitions/response.SuccessResponse"
              - properties:
                  data:
                    items:
                      $ref: "#/definitions/handler.SajdaListItem"
                    type: array
                type: object
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/response.ErrorResponse"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/response.ErrorResponse"
      summary: List sajda ayahs
      tags:
        - Ayah
  /search:
    get:
      description:
        Full-text search across Quran ayahs (Arabic, Indonesian, English)
        using FTS5
      parameters:
        - description: Search query
          in: query
          name: q
          required: true
          type: string
        - default: id
          description: Translation language
          enum:
            - id
            - en
          in: query
          name: lang
          type: string
        - description: Filter by surah ID
          in: query
          maximum: 114
          minimum: 1
          name: surah_id
          type: integer
        - description: Filter by juz number
          in: query
          maximum: 30
          minimum: 1
          name: juz
          type: integer
        - default: 1
          description: Page number
          in: query
          minimum: 1
          name: page
          type: integer
        - default: 20
          description: Items per page
          in: query
          maximum: 100
          minimum: 1
          name: limit
          type: integer
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
              - $ref: "#/definitions/response.SuccessResponse"
              - properties:
                  data:
                    $ref: "#/definitions/handler.SearchResponse"
                type: object
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/response.ErrorResponse"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/response.ErrorResponse"
      summary: Search ayahs
      tags:
        - Search
  /surah:
    get:
      description:
        Get a list of all 114 surahs, optionally filtered by revelation
        type
      parameters:
        - description: Filter by revelation type
          enum:
            - meccan
            - medinan
          in: query
          name: type
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
              - $ref: "#/definitions/response.SuccessResponse"
              - properties:
                  data:
                    items:
                      $ref: "#/definitions/surah.Surah"
                    type: array
                type: object
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/response.ErrorResponse"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/response.ErrorResponse"
      summary: List all surahs
      tags:
        - Surah
  /surah/{id}:
    get:
      description: Get detailed information about a specific surah
      parameters:
        - description: Surah ID (1-114)
          in: path
          maximum: 114
          minimum: 1
          name: id
          required: true
          type: integer
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
              - $ref: "#/definitions/response.SuccessResponse"
              - properties:
                  data:
                    $ref: "#/definitions/surah.Surah"
                type: object
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/response.ErrorResponse"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/response.ErrorResponse"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/response.ErrorResponse"
      summary: Get surah by ID
      tags:
        - Surah
  /surah/{id}/ayah:
    get:
      description: Get ayahs from a specific surah with optional range filtering
      parameters:
        - description: Surah ID (1-114)
          in: path
          maximum: 114
          minimum: 1
          name: id
          required: true
          type: integer
        - description: Start ayah number (must use with 'to')
          in: query
          name: from
          type: integer
        - description: End ayah number (must use with 'from')
          in: query
          name: to
          type: integer
        - default: id
          description: Translation language
          enum:
            - id
            - en
          in: query
          name: lang
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
              - $ref: "#/definitions/response.SuccessResponse"
              - properties:
                  data:
                    $ref: "#/definitions/handler.SurahAyahsResponse"
                type: object
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/response.ErrorResponse"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/response.ErrorResponse"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/response.ErrorResponse"
      summary: Get ayahs by surah
      tags:
        - Ayah
  /surah/{id}/ayah/{number}:
    get:
      description: Get a specific ayah by its surah ID and number within that surah
      parameters:
        - description: Surah ID (1-114)
          in: path
          maximum: 114
          minimum: 1
          name: id
          required: true
          type: integer
        - description: Ayah number within the surah
          in: path
          minimum: 1
          name: number
          required: true
          type: integer
        - default: id
          description: Translation language
          enum:
            - id
            - en
          in: query
          name: lang
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
              - $ref: "#/definitions/response.SuccessResponse"
              - properties:
                  data:
                    $ref: "#/definitions/handler.AyahDetailResponse"
                type: object
        "400":
          description: Bad Request
          schema:
            $ref: "#/definitions/response.ErrorResponse"
        "404":
          description: Not Found
          schema:
            $ref: "#/definitions/response.ErrorResponse"
        "500":
          description: Internal Server Error
          schema:
            $ref: "#/definitions/response.ErrorResponse"
      summary: Get ayah by surah and number
      tags:
        - Ayah
schemes:
  - http
  - https
swagger: "2.0"
